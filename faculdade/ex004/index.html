<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo de formulário HTML com VueJS - Fundamentos de Web</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>Cadastre suas Tarefas Diárias</h1>
    <h3>Thalis - Fundamentos de Web</h3>

    <div id="app"></div>
  </main>

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>

  <script>
    new Vue({
      el: '#app',
      template: `
        <div class="container-fluid">
          <h2>Lista de Tarefas</h2>
          <hr>

          <div class="form-todo form-group">
            <input type="text" placeholder="Digite sua tarefa" class="form-control" v-model="animal">
            <textarea placeholder="Descrição da tarefa" class="form-control" v-model="descricao"></textarea>
            <button v-on:click="addPet" type="submit" class="btn btn-primary w-100">Cadastrar</button>
          </div>

          <div class="list-group mt-3">
            <div class="list-group-item" v-for="(pet, index) in pets">
              <span class="pet_tutor">Tarefa: <strong>{{ pet.animal }}</strong></span>
              <p>Descrição da Tarefa: {{ pet.descricao }}</p>
              <div>
                <a href="#" v-on:click.prevent="removePet(index)">Excluir</a>
              </div>
            </div>
          </div>
        </div>
      `,

      data() {
        return {
          pets: [],
          animal: '',
          descricao: ''
        }
      },

      methods: {
        addPet() {
          if (this.animal.trim() === '' || this.descricao.trim() === '') return;
          this.pets.push({ animal: this.animal, descricao: this.descricao });
          this.animal = '';
          this.descricao = '';
        },

        removePet(index) {
          this.pets.splice(index, 1);
        }
      }
    })
  </script>
</body>
</html>
